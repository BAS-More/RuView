name: Continuous Integration

on:
  push:
    branches: [ main, develop, 'feature/*', 'feat/*', 'hotfix/*', 'claude/*', 'security/*', 'copilot/*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # Code Quality and Security Checks
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black flake8 mypy bandit safety psutil structlog celery kombu pyserial scapy marshmallow jsonschema aiofiles rich typer

    - name: Code formatting check (Black)
      run: black --check --diff v1/src/ v1/tests/
      continue-on-error: true

    - name: Linting (Flake8)
      run: flake8 v1/src/ v1/tests/ --max-line-length=88 --extend-ignore=E203,W503
      continue-on-error: true

    - name: Type checking (MyPy)
      run: mypy v1/src/ --ignore-missing-imports
      continue-on-error: true

    - name: Security scan (Bandit)
      run: bandit -r v1/src/ -f json -o bandit-report.json
      continue-on-error: true

    - name: Dependency vulnerability scan (Safety)
      run: safety check --json --output safety-report.json
      continue-on-error: true

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  # Rust Workspace Tests
  rust-tests:
    name: Rust Workspace Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          rust-port/wifi-densepose-rs/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('rust-port/wifi-densepose-rs/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Check Rust formatting
      working-directory: rust-port/wifi-densepose-rs
      run: cargo fmt --all -- --check

    - name: Run Clippy lints
      working-directory: rust-port/wifi-densepose-rs
      run: cargo clippy --workspace --no-default-features -- -W clippy::all
      continue-on-error: true

    - name: Run Rust tests
      working-directory: rust-port/wifi-densepose-rs
      run: cargo test --workspace --no-default-features
      continue-on-error: true

  # Unit and Integration Tests
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov pytest-xdist psutil structlog celery kombu pyserial scapy marshmallow jsonschema aiofiles rich typer

    - name: Run unit tests
      env:
        ENVIRONMENT: test
      run: |
        pytest v1/tests/unit/ -v -o "addopts=" --junitxml=junit.xml

    - name: Run integration tests
      env:
        ENVIRONMENT: test
      run: |
        pytest v1/tests/integration/ -v -o "addopts=" --junitxml=integration-junit.xml

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          junit.xml
          integration-junit.xml