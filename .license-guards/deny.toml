# cargo-deny config for Rust projects.
# Run: cargo deny check licenses

[graph]
all-features = true

[licenses]
version = 2
unused-allowed-license = "warn"
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "0BSD",
  "CC0-1.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib"
]
confidence-threshold = 0.93

[[licenses.exceptions]]
# Example exception block (none configured by default).
# allow = ["MPL-2.0"]
# crate = "some-crate"

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []
skip = []

[advisories]
version = 2
yanked = "deny"
ignore = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
