# pip-licenses config for Python projects.
# Run: pip-licenses --format=json --with-license-file > licenses.json
#      python scripts/validate-py-licenses.py licenses.json

[allowed]
licenses = [
  "MIT License",
  "MIT",
  "MIT-CMU",
  "Apache Software License",
  "Apache License 2.0",
  "Apache 2.0",
  "Apache-2.0",
  "BSD License",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSD 3-Clause License",
  "ISC License (ISCL)",
  "ISC",
  "Python Software Foundation License",
  "PSF-2.0",
  "The Unlicense (Unlicense)",
  "Unlicense",
  "Mozilla Public License 2.0 (MPL 2.0)",
  "MPL-2.0",
  "Public Domain",
  "Zlib License",
  "Zlib",
  "Historical Permission Notice and Disclaimer (HPND)",
  "HPND"
]

[blocked]
licenses = [
  "GNU General Public License v1 (GPLv1)",
  "GPL-1.0",
  "GNU General Public License v2 (GPLv2)",
  "GPL-2.0",
  "GNU General Public License v3 (GPLv3)",
  "GPL-3.0",
  "GNU General Public License (GPL)",
  "GNU Affero General Public License v3",
  "GNU Affero General Public License v3 or later (AGPLv3+)",
  "AGPL-3.0",
  "Server Side Public License",
  "SSPL-1.0",
  "Business Source License 1.1",
  "BUSL-1.1",
  "Commons Clause"
]

[review_required]
licenses = [
  "GNU Lesser General Public License v2 (LGPLv2)",
  "GNU Lesser General Public License v3 (LGPLv3)",
  "GNU Library or Lesser General Public License (LGPL)",
  "LGPL-2.1",
  "LGPL-3.0",
  "Eclipse Public License 2.0 (EPL-2.0)",
  "EPL-2.0",
  "Common Development and Distribution License 1.0 (CDDL-1.0)",
  "CDDL-1.0",
  "Other/Proprietary License",
  "LicenseRef-NVIDIA-SOFTWARE-LICENSE",
  "LicenseRef-NVIDIA-Proprietary",
  "NVIDIA Proprietary Software",
  "UNKNOWN"
]

# Per-package exemption — see BAS-More/license-guards#2 for the upstream
# `[exempt_packages]` feature. Until that lands, this section is parsed but
# ignored by `validate-py-licenses.py`; the CI failure on scapy persists.
# Once #2 merges, scapy is waved through here without weakening the global
# `[blocked]` list for any other GPLv2 dep that may sneak in.
#
# Tracked in BAS-More/RuView#39.
[exempt_packages]
names = ["scapy"]

[exempt_packages.reasons]
scapy = "GPLv2 accepted: pure-Python protocol decoder used at the packet-parsing boundary; no static linking; the ruview tree is not redistributed under a viral-incompatible licence. Reviewed and accepted in BAS-More/RuView#39."
