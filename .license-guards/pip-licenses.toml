]

# Per-package exemption — upstream feature shipped in
# BAS-More/license-guards#2 (`[exempt_packages]` schema with `names` array
# + `reasons` table).
#
# Tracked in BAS-More/RuView#39.
[exempt_packages]
names = [
  # GPLv2 — accepted at packet-parsing boundary.
  "scapy",

  # NVIDIA proprietary stack — required transitively by torch/CUDA. Used as
  # closed-source binary wheels; we redistribute nothing. Standard NVIDIA EULA
  # applies for any end-user shipping.
  "cuda-bindings",
  "cuda-toolkit",
  "nvidia-cublas",
  "nvidia-cuda-cupti",
  "nvidia-cuda-nvrtc",
  "nvidia-cuda-runtime",
  "nvidia-cudnn-cu13",
  "nvidia-cufft",
  "nvidia-cufile",
  "nvidia-curand",
  "nvidia-cusolver",
  "nvidia-cusparse",
  "nvidia-cusparselt-cu13",
  "nvidia-nccl-cu13",
  "nvidia-nvjitlink",
  "nvidia-nvshmem-cu13",
  "nvidia-nvtx",

  # LGPL Python libs — dynamically-imported modules. No static linking, no
  # modification of the libraries themselves. Project is not redistributed
  # in a form that would invoke LGPL copyleft.
  "paramiko",
  "psycopg2-binary",
]

[exempt_packages.reasons]
scapy = "GPLv2 accepted: pure-Python protocol decoder used at the packet-parsing boundary; no static linking; the ruview tree is not redistributed under a viral-incompatible licence. Reviewed and accepted in BAS-More/RuView#39."
cuda-bindings = "NVIDIA proprietary, transitive dep of torch/CUDA stack. Binary-wheel use only; no redistribution. Reviewed in BAS-More/RuView#39."
cuda-toolkit = "NVIDIA proprietary metapackage (license metadata reports UNKNOWN). Binary-wheel use only; no redistribution. Reviewed in BAS-More/RuView#39."
nvidia-cublas = "NVIDIA proprietary CUDA runtime component. Binary-wheel use only. Reviewed in BAS-More/RuView#39."
nvidia-cuda-cupti = "NVIDIA proprietary CUDA profiling component. Binary-wheel use only. Reviewed in BAS-More/RuView#39."
nvidia-cuda-nvrtc = "NVIDIA proprietary CUDA runtime compiler. Binary-wheel use only. Reviewed in BAS-More/RuView#39."
nvidia-cuda-runtime = "NVIDIA proprietary CUDA runtime. Binary-wheel use only. Reviewed in BAS-More/RuView#39."
nvidia-cudnn-cu13 = "NVIDIA proprietary cuDNN library. Binary-wheel use only. Reviewed in BAS-More/RuView#39."
nvidia-cufft = "NVIDIA proprietary CUDA FFT library. Binary-wheel use only. Reviewed in BAS-More/RuView#39."
nvidia-cufile = "NVIDIA proprietary CUDA file I/O library. Binary-wheel use only. Reviewed in BAS-More/RuView#39."
nvidia-curand = "NVIDIA proprietary CUDA RNG library. Binary-wheel use only. Reviewed in BAS-More/RuView#39."
nvidia-cusolver = "NVIDIA proprietary CUDA solver library. Binary-wheel use only. Reviewed in BAS-More/RuView#39."
nvidia-cusparse = "NVIDIA proprietary CUDA sparse-matrix library. Binary-wheel use only. Reviewed in BAS-More/RuView#39."
nvidia-cusparselt-cu13 = "NVIDIA proprietary CUDA sparse-LT library. Binary-wheel use only. Reviewed in BAS-More/RuView#39."
nvidia-nccl-cu13 = "NVIDIA proprietary collective-comms library. Binary-wheel use only. Reviewed in BAS-More/RuView#39."
nvidia-nvjitlink = "NVIDIA proprietary JIT linker. Binary-wheel use only. Reviewed in BAS-More/RuView#39."
nvidia-nvshmem-cu13 = "NVIDIA proprietary multi-GPU memory library. Binary-wheel use only. Reviewed in BAS-More/RuView#39."
nvidia-nvtx = "NVIDIA proprietary tools-extension library. Binary-wheel use only. Reviewed in BAS-More/RuView#39."
paramiko = "LGPL-2.1 accepted: dynamically-imported pure-Python SSH client; no modification, no static linking, no redistribution under viral-incompatible terms. Reviewed in BAS-More/RuView#39."
psycopg2-binary = "LGPL accepted: dynamically-loaded Postgres driver; binary wheel; no modification or static linking. Reviewed in BAS-More/RuView#39."
