# pip-licenses config for Python projects.
# Run: pip-licenses --format=json --with-license-file > licenses.json
#      python scripts/validate-py-licenses.py licenses.json

[allowed]
licenses = [
  "MIT License",
  "MIT",
  "MIT-CMU",
  "Apache Software License",
  "Apache License 2.0",
  "Apache 2.0",
  "Apache-2.0",
  "BSD License",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSD 3-Clause License",
  "ISC License (ISCL)",
  "ISC",
  "Python Software Foundation License",
  "PSF-2.0",
  "The Unlicense (Unlicense)",
  "Unlicense",
  "Mozilla Public License 2.0 (MPL 2.0)",
  "MPL-2.0",
  "Public Domain",
  "Zlib License",
  "Zlib",
  "Historical Permission Notice and Disclaimer (HPND)",
  "HPND"
]

[blocked]
licenses = [
  "GNU General Public License v1 (GPLv1)",
  "GPL-1.0",
  "GNU General Public License v2 (GPLv2)",
  "GPL-2.0",
  "GNU General Public License v3 (GPLv3)",
