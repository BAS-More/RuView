licenses = [
  "MIT License",
  "MIT",
  "MIT-CMU",
  "Apache Software License",
  "Apache License 2.0",
  "Apache 2.0",
  "Apache-2.0",
  "BSD",
  "BSD License",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSD 3-Clause License",
  "0BSD",
  "BSD Zero Clause License",
  "ISC License (ISCL)",
  "ISC",
  "Python Software Foundation License",
  "PSF-2.0",
  "The Unlicense (Unlicense)",
  "Unlicense",
  "Mozilla Public License 2.0 (MPL 2.0)",
  "MPL-2.0",
  "Public Domain",
  "CC0-1.0",
  "Creative Commons Zero v1.0 Universal",
  "Zlib License",
  "Zlib",
